spring.application.name=rate-limiter

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.datasource.url=jdbc:postgresql://localhost:5433/ratelimiter
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true

# CloudWatch export — disabled locally, enabled in ECS via environment variable
# MANAGEMENT_CLOUDWATCH_METRICS_EXPORT_ENABLED=true  (set in terraform/ecs.tf)
management.cloudwatch.metrics.export.enabled=false
management.cloudwatch.metrics.export.namespace=RateLimiter
management.cloudwatch.metrics.export.step=1m

# Publish p99 percentile for the check latency timer so the CloudWatch alarm has data
management.metrics.distribution.percentiles.ratelimit.check.latency=0.99

# ── Connection pool tuning ────────────────────────────────────────────────────
# HikariCP: rules are Redis-cached so DB hits are rare — 20 connections is plenty
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Lettuce: pool enabled (requires commons-pool2 on classpath)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# Tomcat: enough threads to absorb burst traffic without queuing
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200
